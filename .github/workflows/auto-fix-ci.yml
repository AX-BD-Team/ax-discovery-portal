name: Auto-fix CI Failures

on:
  workflow_run:
    workflows: ["CI Backend", "Frontend CI/CD"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Analyze and Fix CI Failures
    # CI 실패 시에만 실행 (main 브랜치 직접 푸시는 제외)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Get failed workflow run info
        id: failed-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "commit=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Download workflow logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ steps.failed-run.outputs.run_id }} --log-failed > ci-failure-logs.txt 2>&1 || true
          echo "=== CI Failure Logs ==="
          head -500 ci-failure-logs.txt

      - name: Run Claude Code to fix errors
        id: claude-fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          max_turns: 10
          timeout_minutes: 15
          prompt: |
            ## CI 실패 자동 수정

            **실패한 워크플로우**: ${{ steps.failed-run.outputs.workflow_name }}
            **브랜치**: ${{ steps.failed-run.outputs.branch }}
            **커밋**: ${{ steps.failed-run.outputs.commit }}

            ### 작업 지침

            1. **오류 분석**: `ci-failure-logs.txt` 파일을 읽고 실패 원인을 파악하세요.

            2. **자동 수정 가능한 오류**:
               - Lint 오류 (ruff, eslint): 자동 수정 명령 실행 또는 직접 수정
               - Format 오류 (ruff format, prettier): 자동 포맷팅
               - Type 오류 (mypy, typescript): 타입 어노테이션 수정
               - Import 오류: 누락된 import 추가 또는 불필요한 import 제거
               - 간단한 테스트 실패: assertion 수정 또는 mock 업데이트

            3. **자동 수정 불가능한 경우**:
               - 설계 변경이 필요한 경우
               - 비즈니스 로직 수정이 필요한 경우
               - 외부 의존성 문제인 경우
               → 이 경우 수정하지 말고 분석 결과만 출력하세요.

            4. **수정 후 검증**:
               - Backend 오류: `ruff check backend/ tests/` 및 `ruff format --check backend/ tests/` 실행
               - Frontend 오류: `pnpm lint` 및 `pnpm type-check` 실행
               - 수정이 실제로 문제를 해결하는지 확인

            5. **커밋 규칙**:
               - 커밋 메시지: `fix: CI 오류 자동 수정 - [오류 유형]`
               - 커밋하지 않음: 수정 불가능하거나 확신이 없는 경우

            ### 주의사항
            - 최소한의 변경만 수행 (과도한 리팩토링 금지)
            - 기존 코드 의도 유지
            - 테스트 로직 변경 시 신중하게 판단

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "변경 사항 없음"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "=== 변경된 파일 ==="
            git diff --name-only
          fi

      - name: Commit and push fixes
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "fix: CI 오류 자동 수정

          워크플로우: ${{ steps.failed-run.outputs.workflow_name }}
          원본 커밋: ${{ steps.failed-run.outputs.commit }}

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin ${{ steps.failed-run.outputs.branch }}

      - name: Comment on PR (if exists)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PR 번호 찾기
          PR_NUMBER=$(gh pr list --head ${{ steps.failed-run.outputs.branch }} --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ]; then
            if [ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]; then
              gh pr comment $PR_NUMBER --body "## 🤖 CI 오류 자동 수정 완료

          **워크플로우**: ${{ steps.failed-run.outputs.workflow_name }}
          **상태**: ✅ 자동 수정 적용됨

          Claude가 CI 오류를 분석하고 수정 사항을 푸시했습니다.
          새로운 CI 실행 결과를 확인해주세요.

          ---
          *이 코멘트는 [auto-fix-ci](.github/workflows/auto-fix-ci.yml) 워크플로우에 의해 자동 생성되었습니다.*"
            else
              gh pr comment $PR_NUMBER --body "## 🤖 CI 오류 분석 완료

          **워크플로우**: ${{ steps.failed-run.outputs.workflow_name }}
          **상태**: ⚠️ 자동 수정 불가

          CI 오류를 분석했지만 자동으로 수정할 수 없는 유형입니다.
          로그를 확인하고 수동으로 수정해주세요.

          ---
          *이 코멘트는 [auto-fix-ci](.github/workflows/auto-fix-ci.yml) 워크플로우에 의해 자동 생성되었습니다.*"
            fi
          fi

  # 수정 불가능한 경우 알림
  notify-manual-fix-needed:
    name: Notify Manual Fix Required
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Create issue for main branch failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "🚨 Main 브랜치 CI 실패: ${{ github.event.workflow_run.name }}" \
            --body "## CI 실패 알림

          **워크플로우**: ${{ github.event.workflow_run.name }}
          **브랜치**: main
          **커밋**: ${{ github.event.workflow_run.head_sha }}
          **실행 URL**: ${{ github.event.workflow_run.html_url }}

          Main 브랜치에서 CI가 실패했습니다. 즉시 확인이 필요합니다.

          ### 확인 방법
          1. [워크플로우 실행 로그](${{ github.event.workflow_run.html_url }}) 확인
          2. 실패 원인 파악
          3. 수정 PR 생성

          ---
          *이 이슈는 자동 생성되었습니다.*" \
            --label "bug,ci-failure"
